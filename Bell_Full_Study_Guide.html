// ── ENGINE ────────────────────────────────────────────────────────────────────
let done = new Set(JSON.parse(localStorage.getItem('bs_done')||'[]'));
let current = SECTIONS[0].id;

function save(){ try{localStorage.setItem('bs_done',JSON.stringify([...done]))}catch(e){} }

function pct(){
  const total = SECTIONS.flatMap(s=>s.topics).length;
  const n = done.size;
  document.getElementById('pFill').style.width = (n/total*100)+'%';
  document.getElementById('pTxt').textContent = n+' / '+total;
}

function buildTabs(){
  const nav = document.getElementById('tabnav');
  SECTIONS.forEach(s=>{
    const b = document.createElement('button');
    b.className='tab'+(s.id===current?' active':'');
    b.dataset.sid=s.id;
    b.textContent=s.label;
    b.onclick=()=>switchSec(s.id);
    nav.appendChild(b);
  });
}

function buildSidebar(){
  const sb = document.getElementById('sidebar');
  sb.innerHTML='';
  const s = SECTIONS.find(x=>x.id===current);
  if(!s)return;
  const grp=document.createElement('div');grp.className='sb-group';
  const lbl=document.createElement('div');lbl.className='sb-label';lbl.textContent=s.label;
  grp.appendChild(lbl);
  s.topics.forEach(t=>{
    const item=document.createElement('div');
    item.className='sb-item'+(done.has(t.id)?' done':'');
    item.dataset.id=t.id;
    const isDone=done.has(t.id);
    const badge = t.badge ? `<span class="sb-badge badge-${t.badge}">${t.badge.toUpperCase()}</span>` : '';
    item.innerHTML=`<span class="pip"></span>${t.title}${badge}`;
    item.onclick=()=>{
      document.getElementById('card-'+t.id)?.scrollIntoView({behavior:'smooth',block:'start'});
    };
    grp.appendChild(item);
  });
  sb.appendChild(grp);
}

function buildContent(){
  const content=document.getElementById('content');
  content.innerHTML='';
  SECTIONS.forEach(s=>{
    const sec=document.createElement('div');
    sec.id='sec-'+s.id;
    sec.className='sec'+(s.id===current?' visible':'');
    s.topics.forEach(t=>{
      const dmap={basic:'d-basic',mid:'d-mid',adv:'d-adv'};
      const dlbl={basic:'Basic',mid:'Intermediate',adv:'Advanced'};
      const card=document.createElement('div');
      card.id='card-'+t.id;
      card.className='card'+(done.has(t.id)?' done':'');
      card.innerHTML=`
        <div class="card-head" onclick="toggleCard('${t.id}')">
          <div class="card-title"><span class="card-icon">${t.icon}</span>${t.title}</div>
          <div class="card-meta">
            <span class="diff ${dmap[t.diff]||'d-basic'}">${dlbl[t.diff]||'Basic'}</span>
            <span class="chev">▼</span>
          </div>
        </div>
        <div class="card-body">${t.body}
          <button class="done-btn" onclick="markDone('${t.id}',event)">${done.has(t.id)?'✔ Studied':'○ Mark studied'}</button>
        </div>`;
      sec.appendChild(card);
    });
    content.appendChild(sec);
  });
}

function toggleCard(id){
  const c=document.getElementById('card-'+id);
  c.classList.toggle('open');
  if(c.classList.contains('open'))c.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function markDone(id,e){
  e.stopPropagation();
  done.has(id)?done.delete(id):done.add(id);
  save();
  const c=document.getElementById('card-'+id);
  c.classList.toggle('done',done.has(id));
  c.querySelector('.done-btn').textContent=done.has(id)?'✔ Studied':'○ Mark studied';
  const si=document.querySelector(`.sb-item[data-id="${id}"]`);
  if(si)si.classList.toggle('done',done.has(id));
  pct();
}

function switchSec(id){
  current=id;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.sid===id));
  document.querySelectorAll('.sec').forEach(s=>s.classList.toggle('visible',s.id==='sec-'+id));
  buildSidebar();
  window.scrollTo({top:0,behavior:'smooth'});
}

buildTabs(); buildSidebar(); buildContent(); pct();

// Mobile menu toggle
document.getElementById('menuBtn')?.addEventListener('click',()=>{
  document.getElementById('sidebar').classList.toggle('open');
});

// Close sidebar when a sidebar item is clicked
document.addEventListener('click',(e)=>{
  if(e.target.closest('.sb-item')){
    const sidebar=document.getElementById('sidebar');
    if(window.innerWidth<=768){
      sidebar.classList.remove('open');
    }
  }
});

// Close sidebar when clicking outside of it
window.addEventListener('click',(e)=>{
  const sidebar=document.getElementById('sidebar');
  if(sidebar.classList.contains('open')&&!e.target.closest('#sidebar')&&!e.target.closest('#menuBtn')){
    if(window.innerWidth<=768){
      sidebar.classList.remove('open');
    }
  }
});
</script>
</body>
